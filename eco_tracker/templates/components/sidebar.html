<aside class="sidebar">
    <div class="brand">
        <div class="brand-logo">🌱</div>
        <div>
            <h2>Eco Tracker</h2>
            <p>Green Action App</p>
        </div>
    </div>

    <nav class="sidebar-menu">
        <p class="sidebar-section-title" style="margin-top: 8px;">Core</p>
        <a class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
            <span>📊</span> Dashboard
        </a>

        <a class="{% if request.resolver_match.url_name == 'my_progress' %}active{% endif %}" href="{% url 'my_progress' %}">
            <span>📈</span> My Progress
        </a>

        <a class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}" href="{% url 'profile' %}">
            <span>👤</span> Profile
        </a>

        <p class="sidebar-section-title">Community</p>
        <a class="{% if request.resolver_match.url_name == 'eco_feed' %}active{% endif %}" href="{% url 'eco_feed' %}">
            <span>💬</span> Eco Feed
        </a>

        <a class="{% if request.resolver_match.url_name == 'friends' %}active{% endif %}" href="{% url 'friends' %}">
            <span>👥</span> Friends
        </a>

        <a class="{% if request.resolver_match.url_name == 'groups' %}active{% endif %}" href="{% url 'groups' %}">
            <span>🛡️</span> Groups
        </a>

        <a class="{% if request.resolver_match.url_name == 'leaderboard' %}active{% endif %}" href="{% url 'leaderboard' %}">
            <span>🏆</span> Leaderboard
        </a>

        <p class="sidebar-section-title">Challenges</p>
        <a class="{% if request.resolver_match.url_name == 'missions' %}active{% endif %}" href="{% url 'missions' %}">
            <span>🎯</span> Missions
        </a>

        <a class="{% if request.resolver_match.url_name == 'frame_shop' %}active{% endif %}" href="{% url 'frame_shop' %}">
            <span>🛍️</span> Frame Shop
        </a>
    </nav>

    <!-- Prominent CTA Upload Button -->
    <div style="margin-top: 18px; margin-bottom: 8px;">
        <a href="{% url 'upload_action' %}" style="display: block; width: 100%;">
            <button class="upload-btn" style="width: 100%; padding: 13px 18px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 800; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); cursor: pointer; border: none; font-family: inherit;">
                <span>🌱</span> Share Action
            </button>
        </a>
    </div>

    <div class="sidebar-bottom">
        {% if user.is_authenticated %}
            <p>Logged in as</p>
            <h3>{{ user.username }}</h3>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="logout-btn">Logout</button>
            </form>
        {% endif %}
    </div>
</aside>
