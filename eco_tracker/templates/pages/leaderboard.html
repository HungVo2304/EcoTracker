{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Eco Leaderboard</h2>

    <div class="leaderboard-list">
        {% for ranked_user in users %}
            <div class="action-item">
                <div>
                    <h4>#{{ forloop.counter }} {{ ranked_user.username }}</h4>
                    <p>Eco participant</p>
                </div>

                <strong>{{ ranked_user.total_points|default:0 }} pts</strong>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
